<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPL因果框架仓库</title>
    <!-- 👇 只改这里的data-domain，改成你自己的Pages地址 -->
    <script defer data-domain="nohn3043-arch.github.io/SPL-G1-General-purpose-processor" src="https://plausible.io/js/script.js"></script>
</head>
<body>
    <!-- 自动加载显示你的README.md内容，不用手动改 -->
    <script src="https://cdn.jsdelivr.net/npm/showdown@2.1.0/dist/showdown.min.js"></script>
    <div id="readme-content" style="max-width: 1200px; margin: 0 auto; padding: 20px;"></div>
    <script>
        fetch('README.md')
            .then(res => res.text())
            .then(text => {
                const converter = new showdown.Converter();
                document.getElementById('readme-content').innerHTML = converter.makeHtml(text);
            });
    </script>
</body>
</html>
